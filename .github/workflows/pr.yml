name: Pull Request

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'package-lock.json'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - 'vite.config.ts'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x, 26.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Update NPM Version
        run: npm i -g npm

      - name: Install Lib Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get Coverage Info
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # https://github.com/codecov/codecov-action/releases/tag/v7.0.0
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install Lib Dependencies
        run: npm ci

      - name: Install Docs Dependencies
        run: npm ci
        working-directory: www

      - name: Parse TSDoc Documentation
        run: npm run docs:generate

      - name: Build Docs
        run: npm run build
        working-directory: www
